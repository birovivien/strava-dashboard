<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strava Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        a.login-btn {
            background-color: #FC4C02;
            color: white;
            padding: 14px 28px;
            text-decoration: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
        }

        a.login-btn:hover {
            background-color: #e04400;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Strava Dashboard</h1>
        <p>View your personal statistics beyond what Strava shows you.</p>
        <a class="login-btn" href="https://blissful-adaptation-production.up.railway.app/auth/login">
    Login with Strava
</a>
    </div>
</body>
</html>
